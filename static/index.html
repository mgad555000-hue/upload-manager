<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Upload Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden">
    <div class="modal">
        <h3 id="modal-title"></h3>
        <p id="modal-body"></p>
        <div class="modal-actions">
            <button class="cancel" onclick="closeModal()">إلغاء</button>
            <button class="confirm-modal" id="modal-confirm">تأكيد</button>
        </div>
    </div>
</div>

<!-- ===== LOGIN SCREEN ===== -->
<div id="login-screen" class="login-screen">
    <h2>Upload Manager</h2>
    <p>ادخل الكود</p>
    <div class="pin-display" id="pin-display">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="numpad" id="numpad">
        <button onclick="pinInput(1)">1</button>
        <button onclick="pinInput(2)">2</button>
        <button onclick="pinInput(3)">3</button>
        <button onclick="pinInput(4)">4</button>
        <button onclick="pinInput(5)">5</button>
        <button onclick="pinInput(6)">6</button>
        <button onclick="pinInput(7)">7</button>
        <button onclick="pinInput(8)">8</button>
        <button onclick="pinInput(9)">9</button>
        <button disabled></button>
        <button onclick="pinInput(0)">0</button>
        <button class="del-btn" onclick="pinDelete()">مسح</button>
    </div>
    <div class="login-error" id="login-error"></div>
</div>

<!-- ===== CHANNEL SELECTION ===== -->
<div id="channel-screen" class="hidden">
    <div class="header">
        <h1>Upload Manager</h1>
        <div style="display:flex;align-items:center;gap:10px">
            <span class="user-info" id="user-name-ch"></span>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
    </div>
    <div class="nav-title">اختار القناة</div>
    <div class="nav-grid" id="channel-list"></div>
</div>

<!-- ===== PLATFORM SELECTION ===== -->
<div id="platform-screen" class="hidden">
    <div class="header">
        <button class="back-btn" onclick="goToChannels()">رجوع</button>
        <h1 id="platform-screen-title">اختار المنصة</h1>
        <div></div>
    </div>
    <div class="nav-title" id="platform-subtitle"></div>
    <div class="nav-grid" id="platform-list"></div>
</div>

<!-- ===== CONTENT TYPE SELECTION ===== -->
<div id="content-screen" class="hidden">
    <div class="header">
        <button class="back-btn" onclick="goToPlatforms()">رجوع</button>
        <h1 id="content-screen-title">نوع المحتوى</h1>
        <div></div>
    </div>
    <div class="nav-title" id="content-subtitle"></div>
    <div class="nav-grid" id="content-list"></div>
</div>

<!-- ===== TOPIC LIST ===== -->
<div id="topics-screen" class="hidden">
    <div class="header">
        <button class="back-btn" onclick="goToContentType()">رجوع</button>
        <h1 id="topics-screen-title">المواضيع</h1>
        <div></div>
    </div>

    <div class="stats-bar" id="stats-bar">
        <div class="stat-card">
            <div class="num" id="stat-total">0</div>
            <div class="label">المواضيع</div>
        </div>
        <div class="stat-card pending">
            <div class="num" id="stat-pending">0</div>
            <div class="label">متبقي</div>
        </div>
        <div class="stat-card uploaded">
            <div class="num" id="stat-today">0</div>
            <div class="label">اليوم</div>
        </div>
        <div class="stat-card locked">
            <div class="num" id="stat-locked">0</div>
            <div class="label">مقفول</div>
        </div>
    </div>

    <div class="nav-path" id="nav-path"></div>

    <div class="topic-list" id="topic-list">
        <div class="loading">جاري التحميل...</div>
    </div>
</div>

<!-- ===== UPLOAD SCREEN ===== -->
<div id="upload-screen" class="hidden">
    <div class="header">
        <button class="back-btn" onclick="goBack()">رجوع</button>
        <h1 id="upload-title">رفع</h1>
        <div></div>
    </div>

    <div class="upload-screen">
        <div class="upload-header">
            <h3 id="upload-topic-title"></h3>
            <div class="meta" id="upload-meta"></div>
        </div>

        <div id="schedule-section"></div>

        <div id="fields-section"></div>

        <div id="tiktok-section" style="display:none;padding:0 0 10px 0"></div>

        <div class="confirm-section" id="confirm-section" style="display:none">
            <div class="confirm-progress" id="confirm-progress"></div>
            <button class="confirm-btn" id="confirm-btn" disabled onclick="onConfirmClick()">
                تأكيد تم الرفع
            </button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
